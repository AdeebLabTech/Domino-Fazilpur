<!-- Overlay -->
<div class="overlay" id="page-overlay"></div>

<!-- Cart Sidebar -->
<div class="sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h3><svg class="icon" style="width:18px;height:18px" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg> Your Cart</h3>
        <button class="close-btn" onclick="toggleCart()"><svg class="icon" style="width:20px;height:20px" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
    </div>
    <div class="cart-body" id="cart-content"></div>
    <div class="cart-footer" id="cart-footer-actions"></div>
</div>

<!-- Product Detail Modal -->
<div class="product-detail-overlay" id="product-detail-overlay">
    <div class="product-detail-modal">
        <div class="pd-image-side">
            <img class="pd-image" id="pd-image" src="" alt="">
            <div class="pd-name-banner"><h3 id="pd-name"></h3></div>
        </div>
        <div class="pd-content-side">
            <div class="pd-header">
                <div class="pd-price" id="pd-price"></div>
                <div class="pd-header-actions">
                    <button class="pd-icon-btn" onclick="closeProductDetail()"><svg class="icon" style="width:18px;height:18px;stroke:white" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
                </div>
            </div>
            <p class="pd-description" id="pd-description"></p>
            <div id="pd-variant-picker"></div>
            <div class="pd-footer">
                <div class="qty-stepper pd-qty-stepper" id="pd-qty-stepper-wrap">
                    <button class="qty-btn qty-remove" onclick="updatePdQty(-1)">&minus;</button>
                    <span class="qty-count" id="pd-qty">1</span>
                    <button class="qty-btn qty-add" onclick="updatePdQty(1)">+</button>
                </div>
                <button class="pd-add-btn" id="pd-add-to-cart">
                    <span id="pd-add-price"></span>
                    <span id="pd-add-divider">|</span>
                    <span id="pd-add-label">Add to Cart</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Checkout Details Modal -->
<div class="checkout-details-overlay" id="checkout-details-overlay">
    <div class="checkout-details-modal">
        <div class="checkout-details-header">
            <h3>Delivery Details</h3>
            <button class="close-btn" onclick="closeCheckoutDetails()"><svg class="icon" style="width:20px;height:20px" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
        </div>
        <div class="checkout-details-body">
            <span class="cd-label" style="margin-top:0">Order Type</span>
            <div class="order-type-options">
                <button class="order-type-btn active" data-order-type="Delivery" onclick="selectOrderType('Delivery')">Delivery</button>
                <button class="order-type-btn" data-order-type="Pick-Up" onclick="selectOrderType('Pick-Up')">Pick-Up</button>
                <button class="order-type-btn" data-order-type="Car hop" onclick="selectOrderType('Car hop')">Car Hop</button>
                <button class="order-type-btn" data-order-type="Dine-In" onclick="selectOrderType('Dine-In')">Dine-In</button>
            </div>

            <label class="cd-label">Full Name</label>
            <input class="cd-input" type="text" id="cd-name" placeholder="e.g. Ali Khan">

            <label class="cd-label">Phone Number</label>
            <input class="cd-input" type="tel" id="cd-phone" placeholder="e.g. 0300 1234567">

            <div id="cd-address-group">
                <label class="cd-label">Delivery Address</label>
                <textarea class="cd-input cd-textarea" id="cd-address" placeholder="House #, street, area, nearest landmark"></textarea>
                <button class="cd-location-btn" onclick="useCurrentLocation()"><svg class="icon" style="width:16px;height:16px" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v4m0 12v4M2 12h4m12 0h4"/></svg> Use current location</button>
                <span class="cd-location-status" id="cd-location-status"></span>
            </div>

            <div id="cd-carhop-group" style="display:none">
                <label class="cd-label">Vehicle Details</label>
                <input class="cd-input" type="text" id="cd-vehicle" placeholder="e.g. Toyota Corolla, White">
                <label class="cd-label">Number Plate</label>
                <input class="cd-input" type="text" id="cd-plate" placeholder="e.g. ABC-1234">
            </div>

            <div id="cd-table-group" style="display:none">
                <label class="cd-label">Table Number</label>
                <input class="cd-input" type="text" id="cd-table" placeholder="e.g. 12">
            </div>

            <div class="cd-error" id="cd-error" style="display:none"></div>
        </div>
        <div class="checkout-details-footer">
            <button class="checkout-btn" onclick="confirmCheckoutDetails()">Confirm Order</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Main Header - direct children of .main-header, NO .container wrapper -->
<header class="main-header">
    <div class="header-left">
        <a href="index.html" class="logo-badge">
            <img src="assets/images/Domino Fazilpur png logo.png" alt="Domino Fazilpur" class="header-logo header-logo-img">
        </a>
    </div>
    <div class="header-center">
        <a href="https://wa.me/923441713141" target="_blank" rel="noopener noreferrer">
            <button class="contact-pill">
                <span class="pill-icon-circle"><svg class="icon" style="width:16px;height:16px" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></span>
                <span class="hide-mobile">Contact Us</span>
            </button>
        </a>
    </div>
    <div class="header-right">
        <a href="index.html" class="icon-btn" aria-label="Home">
            <svg class="icon" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <button class="icon-btn" onclick="toggleCart()" aria-label="Cart">
            <svg class="icon" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="badge" id="cart-badge" style="display:none">0</span>
        </button>
    </div>
</header>
