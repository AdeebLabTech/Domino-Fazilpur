<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domino Fazilpur | Menu</title>
    <meta name="description" content="Browse the full menu of Domino Fazilpur Fast Food Restaurant Point - pizzas, burgers, chicken, deals and more.">
    <meta name="author" content="Domino Fazilpur">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://fastfoodrestaurant.com/menu.html">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fastfoodrestaurant.com/menu.html">
    <meta property="og:title" content="Domino Fazilpur | Menu">
    <meta property="og:description" content="Browse our full menu - pizzas, burgers, chicken, deals and more from Domino Fazilpur.">
    <meta property="og:image" content="https://fastfoodrestaurant.com/assets/images/burger.png">
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="theme-red.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <div class="menu-controls">
        <nav class="category-nav">
            <button type="button" class="cat-nav-arrow cat-nav-arrow-left" onclick="scrollCategoryNav(-1)" aria-label="Scroll categories left">
                <svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <ul id="horizontal-categories"></ul>
            <button type="button" class="cat-nav-arrow cat-nav-arrow-right" onclick="scrollCategoryNav(1)" aria-label="Scroll categories right">
                <svg class="icon" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
            </button>
        </nav>
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon"><svg class="icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
                <input type="text" id="menu-search" placeholder="Search for items..." onkeyup="filterMenu()">
                <button class="search-btn"><svg class="icon" style="width:16px;height:16px;stroke:white" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
            </div>
        </div>
    </div>

    <main class="menu-content" id="menu-grid"></main>

    <div id="footer-placeholder"></div>

    <script src="app.js"></script>
</body>
</html>
